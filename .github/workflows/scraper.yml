name: SarkariResult Auto Scraper

# Har ghante ke start pe chalega (1:00, 2:00, 3:00... - GitHub ka
# scheduled cron "best effort" hota hai, kabhi 1-10 min late bhi ho
# sakta hai, lekin roughly hourly rahega). Manual "Run workflow"
# button se bhi turant chala sakte ho (workflow_dispatch).
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

# Repo mein wapas commit (data/ aur snapshots/) karne ke liye permission
permissions:
  contents: write
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout karo
        uses: actions/checkout@v4

      - name: Python setup karo
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies install karo
        run: pip install -r requirements.txt

      - name: Scraper + AI format + CareerFlora publish chalao (ek baar check)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          GROQ_KEY_1: ${{ secrets.GROQ_KEY_1 }}
          GROQ_KEY_2: ${{ secrets.GROQ_KEY_2 }}
          GROQ_KEY_3: ${{ secrets.GROQ_KEY_3 }}
          GROQ_KEY_4: ${{ secrets.GROQ_KEY_4 }}
          GROQ_KEY_5: ${{ secrets.GROQ_KEY_5 }}
          GROQ_KEY_6: ${{ secrets.GROQ_KEY_6 }}
          GROQ_KEY_7: ${{ secrets.GROQ_KEY_7 }}
          GROQ_KEY_8: ${{ secrets.GROQ_KEY_8 }}
          GROQ_KEY_9: ${{ secrets.GROQ_KEY_9 }}
          GROQ_KEY_10: ${{ secrets.GROQ_KEY_10 }}
          GROQ_KEY_11: ${{ secrets.GROQ_KEY_11 }}
          GROQ_KEY_12: ${{ secrets.GROQ_KEY_12 }}
          GROQ_KEY_13: ${{ secrets.GROQ_KEY_13 }}
          GROQ_KEY_14: ${{ secrets.GROQ_KEY_14 }}
          CAREERFLORA_API_URL: ${{ secrets.CAREERFLORA_API_URL }}
          CAREERFLORA_API_KEY: ${{ secrets.CAREERFLORA_API_KEY }}
        run: python run_once.py

      - name: Generate monitor status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python monitor.py

      - name: Naya data + seen-posts record commit karo
        run: |
          git config user.name "sarkariresult-scraper-bot"
          git config user.email "actions@github.com"
          git add data/ snapshots/ logs/ monitor/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push